name: Relay Schedule Runner

on:
  schedule:
    # GitHub Actions cron minimum granularity is 1 minute but is only a
    # best-effort schedule; every 5 minutes keeps this reliable and free.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  run-schedules:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Write Firebase service account key
        run: echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - run: npm start
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
          FIREBASE_DATABASE_URL: https://iot1-bdd00-default-rtdb.firebaseio.com

      - name: Clean up credentials
        if: always()
        run: rm -f service-account.json
